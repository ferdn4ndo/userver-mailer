services:
  userver-mail:
    container_name: userver-mail
    restart: unless-stopped
    image: ghcr.io/docker-mailserver/docker-mailserver:15.1.0
    # Must match your MX / OVERRIDE_HOSTNAME in mail/.env — set MAIL_FQDN in a `.env` next to this file
    hostname: ${MAIL_FQDN:-mail.example.com}
    ports:
      - "25:25"
      - "143:143"
      - "465:465"
      - "587:587"
      - "993:993"
    volumes:
      - ./data:/var/mail
      - ./state:/var/mail-state
      - ./logs:/var/log/mail
      - ./mail/config/:/tmp/docker-mailserver/
      - ../userver-web/certs:/etc/letsencrypt/live
    env_file:
      - ./mail/.env
    cap_add:
      - NET_ADMIN
      - SYS_PTRACE
    stop_grace_period: 1m

  userver-mailbackup:
    build:
      context: backup
      dockerfile: Dockerfile
    container_name: userver-mailbackup
    depends_on:
      - userver-mail
    env_file:
      - ./backup/.env
    volumes:
      - ./data:/data/mail-data:ro
      - ./state:/data/mail-state:ro
      - ./logs:/data/mail-logs:ro

  userver-webmail:
    container_name: userver-webmail
    restart: unless-stopped
    image: roundcube/roundcubemail:latest-apache
    depends_on:
      - userver-mail
    env_file:
      - ./webmail/.env
    expose:
      - 80
    volumes:
      - ../userver-web/certs:/certs:ro
      - ./webmail/sites-available:/etc/apache2/sites-available
      - ./webmail/config:/var/roundcube/config

  userver-postfixadmin:
    container_name: userver-postfixadmin
    restart: unless-stopped
    build:
      context: postfixadmin
      dockerfile: Dockerfile
    image: userver-postfixadmin:4-apache
    expose:
      - 80
    env_file:
      - ./postfixadmin/.env

networks:
  default:
    name: nginx-proxy
    external: true
